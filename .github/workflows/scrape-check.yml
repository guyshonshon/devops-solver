name: Scrape — check for new labs

on:
  schedule:
    # Run every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  check-new-labs:
    name: Detect new labs / homework
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal deps
        run: pip install httpx beautifulsoup4 lxml

      - name: Scrape and diff
        env:
          TARGET_SITE: "https://hothaifa96.github.io/DevSecOps22/"
        run: |
          python - <<'EOF'
          import httpx, json, pathlib
          from bs4 import BeautifulSoup

          KNOWN_FILE = "known_labs.json"
          BASE = "https://hothaifa96.github.io/DevSecOps22/"
          PATHS = [
            "linux/labs/1-lab/", "linux/labs/2-lab/",
            "python/labs/1-lab/", "GIT/lessons/Git-starter/",
            "homeworks/linux-homework/"
          ]

          known = json.loads(pathlib.Path(KNOWN_FILE).read_text()) if pathlib.Path(KNOWN_FILE).exists() else []
          current = [BASE + p for p in PATHS]

          new_labs = [u for u in current if u not in known]
          if new_labs:
            print(f"NEW LABS DETECTED: {new_labs}")
            pathlib.Path(KNOWN_FILE).write_text(json.dumps(current, indent=2))
          else:
            print("No new labs found")
          EOF

      - name: Commit updated known_labs.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add known_labs.json
          git diff --staged --quiet || git commit -m "chore: update known labs list [skip ci]"
          git push || true
