services:
  backend:
    build: ./backend
    container_name: devops-solver-backend-dev
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////app/data/devops_solver.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data

  frontend:
    image: node:20-alpine
    container_name: devops-solver-frontend-dev
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - VITE_DEV_API_TARGET=http://backend:8000
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  data:
  frontend_node_modules:
